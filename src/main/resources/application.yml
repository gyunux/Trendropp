site:
  name: TrenDropp

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  forward-headers-strategy: native

spring:
  messages:
    encoding: UTF-8
    basename: messages
  thymeleaf:
    encoding: UTF-8

crawler:
  repeat-count: 5

gemini:
  api:
    key: ${API_KEY}

cloud:
  oci:
    s3:
      endpoint: ${OCI_S3_ENDPOINT}
      region: ${OCI_S3_REGION}
      bucket: ${OCI_S3_BUCKET}
      access-key: ${OCI_S3_ACCESS_KEY}
      secret-key: ${OCI_S3_SECRET_KEY}